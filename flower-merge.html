<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flower Merge — Gabi's Games</title>

  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, #fff7fb, transparent 30%),
        radial-gradient(circle at bottom right, #ffc7e5, transparent 35%),
        linear-gradient(135deg, #ffe6f3, #fff7fb, #ffd6ec);
      color: #7b3f61;
      text-align: center;
      overflow-x: hidden;
    }

    header {
      padding: 18px;
      background: rgba(255,255,255,.7);
      backdrop-filter: blur(12px);
      border-bottom: 3px solid #ffc2df;
      box-shadow: 0 8px 25px rgba(255, 130, 185, .25);
    }

    header a {
      color: #d94f9d;
      text-decoration: none;
      font-weight: bold;
      margin: 0 12px;
    }

    h1 {
      margin: 18px 0 4px;
      font-size: clamp(2rem, 6vw, 3rem);
      color: #e45fa8;
      text-shadow: 2px 2px white;
    }

    .subtitle {
      margin-bottom: 14px;
    }

    .game-wrap {
      max-width: 560px;
      margin: 18px auto 40px;
      padding: 18px;
      border-radius: 32px;
      background: rgba(255,255,255,.74);
      border: 3px solid #ffc5e3;
      box-shadow: 0 20px 45px rgba(219, 72, 148, .24);
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 12px;
      font-weight: bold;
    }

    .pill {
      background: #fff0f8;
      border: 2px solid #ffb8dc;
      border-radius: 999px;
      padding: 10px;
      box-shadow: inset 0 -3px #ffd6ec;
    }

    canvas {
      width: 100%;
      max-width: 500px;
      height: 650px;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.98), rgba(255,239,248,.9)),
        linear-gradient(#fff8fc, #ffe1f1);
      border: 5px solid #f9a8d4;
      border-radius: 30px;
      box-shadow:
        inset 0 0 28px rgba(255, 134, 194, .28),
        0 10px 28px rgba(221, 91, 160, .18);
      cursor: pointer;
      touch-action: none;
    }

    .controls {
      margin-top: 12px;
      font-size: .95rem;
      line-height: 1.5;
    }

    .button-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    button {
      border: none;
      background: linear-gradient(135deg, #ff85c8, #ffb3dc);
      color: white;
      padding: 12px 20px;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(219, 72, 148, .3);
    }

    button:hover {
      transform: translateY(-2px);
    }

    .petal {
      position: fixed;
      top: -40px;
      pointer-events: none;
      opacity: .6;
      animation: fall linear infinite;
      z-index: 1;
    }

    @keyframes fall {
      from { transform: translateY(-60px) rotate(0deg); }
      to { transform: translateY(110vh) rotate(360deg); }
    }

    @media (max-width: 600px) {
      .game-wrap {
        margin: 10px;
        padding: 12px;
      }

      .hud {
        grid-template-columns: 1fr;
      }

      canvas {
        height: 580px;
      }
    }
  </style>
</head>

<body>
  <header>
    <a href="index.html">Gabi's Games</a>
    <a href="games.html">Games</a>
    <a href="leaderboard.html">Leaderboard</a>
  </header>

  <main>
    <h1>🌸 Flower Merge 🌸</h1>
    <p class="subtitle">Launch matching flowers and grow the dreamiest pastel garden.</p>

    <section class="game-wrap">
      <div class="hud">
        <div class="pill">Score: <span id="score">0</span></div>
        <div class="pill">Next: <span id="nextFlower">🌼</span></div>
        <div class="pill">Best: <span id="best">0</span></div>
      </div>

      <canvas id="game" width="500" height="650"></canvas>

      <div class="controls">
        Move your mouse or finger to aim. Click or tap to drop.
        Match two of the same flower to merge into a bigger bloom.
      </div>

      <div class="button-row">
        <button onclick="restartGame()">Restart Garden</button>
        <button onclick="toggleSound()">Sound: <span id="soundLabel">On</span></button>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const nextFlowerEl = document.getElementById("nextFlower");
    const soundLabel = document.getElementById("soundLabel");

    const W = canvas.width;
    const H = canvas.height;
    const DANGER_LINE = 88;
    const FLOOR = H - 12;

    const flowerTypes = [
      { emoji: "🌼", r: 21, points: 5 },
      { emoji: "🌸", r: 27, points: 15 },
      { emoji: "🌷", r: 33, points: 35 },
      { emoji: "🌺", r: 40, points: 75 },
      { emoji: "🌹", r: 48, points: 150 },
      { emoji: "🌻", r: 58, points: 320 },
      { emoji: "💐", r: 70, points: 700 },
      { emoji: "🌳", r: 84, points: 1500 },
      { emoji: "✨", r: 100, points: 3500 }
    ];

    let flowers = [];
    let particles = [];
    let floatingTexts = [];

    let score = 0;
    let best = Number(localStorage.getItem("flowerMergeBest") || 0);
    let nextType = randomStartType();
    let aimX = W / 2;
    let canDrop = true;
    let gameOver = false;
    let soundOn = true;
    let dangerTimer = 0;

    scoreEl.textContent = score;
    bestEl.textContent = best;
    nextFlowerEl.textContent = flowerTypes[nextType].emoji;

    function randomStartType() {
      return Math.floor(Math.random() * 3);
    }

    function restartGame() {
      flowers = [];
      particles = [];
      floatingTexts = [];
      score = 0;
      dangerTimer = 0;
      gameOver = false;
      canDrop = true;
      nextType = randomStartType();

      scoreEl.textContent = score;
      nextFlowerEl.textContent = flowerTypes[nextType].emoji;
    }

    function toggleSound() {
      soundOn = !soundOn;
      soundLabel.textContent = soundOn ? "On" : "Off";
    }

    function playPop() {
      if (!soundOn) return;

      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audio = new AudioContext();
        const osc = audio.createOscillator();
        const gain = audio.createGain();

        osc.frequency.value = 680;
        osc.type = "sine";

        gain.gain.setValueAtTime(0.08, audio.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + 0.12);

        osc.connect(gain);
        gain.connect(audio.destination);

        osc.start();
        osc.stop(audio.currentTime + 0.12);
      } catch (e) {}
    }

    function addFlower(x) {
      if (!canDrop || gameOver) return;

      const type = nextType;
      const info = flowerTypes[type];

      flowers.push({
        x: Math.max(info.r, Math.min(W - info.r, x)),
        y: 42,
        vx: 0,
        vy: 0,
        type,
        r: info.r,
        age: 0,
        mergeCooldown: 10,
        wobble: 0,
        rotation: Math.random() * 0.3 - 0.15
      });

      nextType = randomStartType();
      nextFlowerEl.textContent = flowerTypes[nextType].emoji;

      canDrop = false;
      setTimeout(() => canDrop = true, 430);
    }

    function mergeFlowers(i, j) {
      const a = flowers[i];
      const b = flowers[j];

      if (!a || !b) return;
      if (a.type !== b.type) return;
      if (a.type >= flowerTypes.length - 1) return;

      const newType = a.type + 1;
      const info = flowerTypes[newType];

      const x = (a.x + b.x) / 2;
      const y = (a.y + b.y) / 2;

      flowers.splice(Math.max(i, j), 1);
      flowers.splice(Math.min(i, j), 1);

      flowers.push({
        x,
        y,
        vx: 0,
        vy: -2.1,
        type: newType,
        r: info.r,
        age: 0,
        mergeCooldown: 14,
        wobble: 18,
        rotation: 0
      });

      const gained = info.points;
      score += gained;
      scoreEl.textContent = score;

      if (score > best) {
        best = score;
        localStorage.setItem("flowerMergeBest", best);
        bestEl.textContent = best;
      }

      createSparkles(x, y, flowerTypes[newType].emoji);

      floatingTexts.push({
        x,
        y,
        text: `+${gained}`,
        life: 65
      });

      playPop();
    }

    function createSparkles(x, y, emoji) {
      for (let i = 0; i < 18; i++) {
        const angle = Math.random() * Math.PI * 2;
        particles.push({
          x,
          y,
          vx: Math.cos(angle) * (Math.random() * 3 + 1),
          vy: Math.sin(angle) * (Math.random() * 3 + 1),
          life: 45,
          emoji: Math.random() > .65 ? emoji : "✨",
          size: 13 + Math.random() * 10
        });
      }
    }

    function updatePhysics() {
      if (gameOver) return;

      for (const f of flowers) {
        f.age++;
        if (f.mergeCooldown > 0) f.mergeCooldown--;

        f.vy += 0.26;
        f.x += f.vx;
        f.y += f.vy;

        f.vx *= 0.987;
        f.vy *= 0.987;

        if (f.wobble > 0) f.wobble *= 0.9;

        if (f.x - f.r < 0) {
          f.x = f.r;
          f.vx *= -0.35;
          f.wobble = 8;
        }

        if (f.x + f.r > W) {
          f.x = W - f.r;
          f.vx *= -0.35;
          f.wobble = 8;
        }

        if (f.y + f.r > FLOOR) {
          f.y = FLOOR - f.r;
          f.vy *= -0.15;
          f.vx *= 0.92;
          f.wobble = Math.max(f.wobble, 5);
        }
      }

      resolveCollisionsAndMerges();
      updateEffects();
      checkGameOver();
    }

    function resolveCollisionsAndMerges() {
      let merged = false;

      for (let pass = 0; pass < 3; pass++) {
        for (let i = 0; i < flowers.length; i++) {
          for (let j = i + 1; j < flowers.length; j++) {
            const a = flowers[i];
            const b = flowers[j];

            if (!a || !b) continue;

            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const dist = Math.hypot(dx, dy) || 0.001;
            const minDist = a.r + b.r;

            if (dist < minDist) {
              if (
                !merged &&
                a.type === b.type &&
                a.mergeCooldown <= 0 &&
                b.mergeCooldown <= 0 &&
                a.type < flowerTypes.length - 1
              ) {
                mergeFlowers(i, j);
                merged = true;
                return;
              }

              const overlap = minDist - dist;
              const nx = dx / dist;
              const ny = dy / dist;

              a.x -= nx * overlap * 0.5;
              a.y -= ny * overlap * 0.5;
              b.x += nx * overlap * 0.5;
              b.y += ny * overlap * 0.5;

              const push = 0.028;
              a.vx -= nx * overlap * push;
              a.vy -= ny * overlap * push;
              b.vx += nx * overlap * push;
              b.vy += ny * overlap * push;

              a.wobble = Math.max(a.wobble, 3);
              b.wobble = Math.max(b.wobble, 3);
            }
          }
        }
      }
    }

    function updateEffects() {
      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.035;
        p.life--;
      }

      particles = particles.filter(p => p.life > 0);

      for (const t of floatingTexts) {
        t.y -= 0.75;
        t.life--;
      }

      floatingTexts = floatingTexts.filter(t => t.life > 0);
    }

    function checkGameOver() {
      const oldSettledFlowers = flowers.filter(f => {
        return f.age > 160 && Math.abs(f.vy) < 0.08;
      });

      const touchingDangerLine = oldSettledFlowers.some(f => {
        return f.y - f.r < DANGER_LINE;
      });

      if (touchingDangerLine && flowers.length > 18) {
        dangerTimer++;
      } else {
        dangerTimer = Math.max(0, dangerTimer - 2);
      }

      if (dangerTimer > 90) {
        gameOver = true;
      }
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      drawDecor();
      drawDangerLine();
      drawAim();

      for (const f of flowers) drawFlower(f);

      drawParticles();
      drawFloatingTexts();

      if (gameOver) drawGameOver();
    }

    function drawDecor() {
      ctx.fillStyle = "rgba(255, 197, 227, .22)";
      for (let i = 0; i < 8; i++) {
        ctx.beginPath();
        ctx.arc(45 + i * 70, 595, 36, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawDangerLine() {
      ctx.fillStyle = "rgba(255, 142, 197, .35)";
      ctx.fillRect(0, DANGER_LINE, W, 3);

      ctx.fillStyle = "#d94f9d";
      ctx.font = "14px Trebuchet MS";
      ctx.textAlign = "center";
      ctx.fillText("danger line", W / 2, DANGER_LINE - 8);
    }

    function drawAim() {
      ctx.save();

      ctx.beginPath();
      ctx.moveTo(aimX, 0);
      ctx.lineTo(aimX, 55);
      ctx.strokeStyle = "rgba(217, 79, 157, .45)";
      ctx.lineWidth = 4;
      ctx.setLineDash([8, 8]);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.font = "38px serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(flowerTypes[nextType].emoji, aimX, 35);

      ctx.restore();
    }

    function drawFlower(f) {
      const info = flowerTypes[f.type];

      ctx.save();
      ctx.translate(f.x, f.y);

      const wobble = 1 + Math.sin(Date.now() / 80) * (f.wobble / 120);
      ctx.scale(wobble, 1 / wobble);
      ctx.rotate(f.rotation);

      ctx.beginPath();
      ctx.arc(0, 0, f.r, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255, 225, 242, .92)";
      ctx.fill();
      ctx.strokeStyle = "rgba(219, 72, 148, .45)";
      ctx.lineWidth = 3;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(-f.r * .25, -f.r * .3, f.r * .2, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,255,255,.5)";
      ctx.fill();

      ctx.font = `${f.r * 1.18}px serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(info.emoji, 0, 2);

      ctx.restore();
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.save();
        ctx.globalAlpha = p.life / 45;
        ctx.font = `${p.size}px serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(p.emoji, p.x, p.y);
        ctx.restore();
      }
    }

    function drawFloatingTexts() {
      for (const t of floatingTexts) {
        ctx.save();
        ctx.globalAlpha = t.life / 65;
        ctx.fillStyle = "#d94f9d";
        ctx.font = "bold 20px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(t.text, t.x, t.y);
        ctx.restore();
      }
    }

    function drawGameOver() {
      ctx.save();

      ctx.fillStyle = "rgba(255, 240, 248, .92)";
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = "#d94f9d";
      ctx.font = "bold 42px Trebuchet MS";
      ctx.textAlign = "center";
      ctx.fillText("Garden Full!", W / 2, H / 2 - 42);

      ctx.font = "22px Trebuchet MS";
      ctx.fillText("Final Score: " + score, W / 2, H / 2 + 4);
      ctx.fillText("Click Restart Garden to play again", W / 2, H / 2 + 42);

      ctx.font = "48px serif";
      ctx.fillText("🌸 💐 🌷", W / 2, H / 2 + 102);

      ctx.restore();
    }

    function updateAim(clientX) {
      const rect = canvas.getBoundingClientRect();
      aimX = (clientX - rect.left) * (canvas.width / rect.width);
      aimX = Math.max(28, Math.min(W - 28, aimX));
    }

    canvas.addEventListener("mousemove", e => {
      updateAim(e.clientX);
    });

    canvas.addEventListener("click", () => {
      addFlower(aimX);
    });

    canvas.addEventListener("touchstart", e => {
      e.preventDefault();
      updateAim(e.touches[0].clientX);
    }, { passive: false });

    canvas.addEventListener("touchmove", e => {
      e.preventDefault();
      updateAim(e.touches[0].clientX);
    }, { passive: false });

    canvas.addEventListener("touchend", e => {
      e.preventDefault();
      addFlower(aimX);
    }, { passive: false });

    function createPagePetals() {
      const petals = ["🌸", "🌷", "🌼", "💗", "✨"];

      for (let i = 0; i < 24; i++) {
        const petal = document.createElement("div");
        petal.className = "petal";
        petal.textContent = petals[Math.floor(Math.random() * petals.length)];
        petal.style.left = Math.random() * 100 + "vw";
        petal.style.animationDuration = 7 + Math.random() * 10 + "s";
        petal.style.animationDelay = Math.random() * 8 + "s";
        petal.style.fontSize = 16 + Math.random() * 18 + "px";
        document.body.appendChild(petal);
      }
    }

    function loop() {
      updatePhysics();
      draw();
      requestAnimationFrame(loop);
    }

    createPagePetals();
    loop();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard — Gabi's Games 🏆</title>
  <meta name="description" content="Top 100 scores across Gabi's Games. Can you reach #1?">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="loader"><div class="loader-cube"></div><div class="loader-text">Loading cuteness… 🎀</div></div>
  <nav class="nav">
    <a class="nav__logo" href="index.html">Gabi's Games 🎀</a>
    <div style="display:flex;align-items:center;gap:12px">
      <ul class="nav__links">
        <li><a href="index.html">Home</a></li>
        <li><a href="games.html">Games</a></li>
        <li><a href="about.html">About</a></li>
        <li><a class="active" href="leaderboard.html">Leaderboard</a></li>
      </ul>
      <button class="mute-btn" aria-label="Toggle sound">🔊</button>
      <button class="nav__toggle" aria-label="Menu">☰</button>
    </div>
  </nav>
  <main>
    <section class="section">
      <h2 class="section__title">Leaderboard 🏆</h2>
      <p class="section__sub">The top 100 cuties of all time ✨</p>
      <div class="lb-tabs" id="lb-tabs"></div>
      <div class="lb-wrap">
        <table>
          <thead><tr><th>Rank</th><th>Name</th><th>Score</th></tr></thead>
          <tbody id="lb-body"></tbody>
        </table>
        <div class="lb-status" id="lb-status">Loading scores… 🎀</div>
      </div>
    </section>
  </main>
  <footer class="footer">Made with 💕 by Gabi</footer>

  <script src="js/config.js"></script><script src="js/audio.js"></script>
  <script src="js/leaderboard.js"></script><script src="js/main.js"></script>
  <script>
    /* Build a tab per game that has a leaderboard, then render scores. */
    (async () => {
      const games = window.GABI.GAMES.filter(g => g.hasLeaderboard);
      const tabs = document.getElementById("lb-tabs");
      const body = document.getElementById("lb-body");
      const status = document.getElementById("lb-status");
      let current = games[0]?.id || null;

      function medal(i){ return ["🥇","🥈","🥉"][i] || (i+1); }

      async function render() {
        status.textContent = "Loading scores… 🎀";
        body.innerHTML = "";
        const rows = await GabiLeaderboard.get(current);
        if (!rows.length) { status.textContent = "No scores yet — be the first! 💕"; return; }
        status.textContent = "";
        body.innerHTML = rows.map((r,i) =>
          `<tr><td class="rank-medal">${medal(i)}</td><td>${escapeHtml(r.name)}</td><td>${r.score}</td></tr>`
        ).join("");
      }
      function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

      tabs.innerHTML = games.map(g =>
        `<button data-id="${g.id}" class="${g.id===current?'active':''}">${g.emoji} ${g.title}</button>`).join("");
      tabs.querySelectorAll("button").forEach(b => b.addEventListener("click", () => {
        current = b.dataset.id;
        tabs.querySelectorAll("button").forEach(x => x.classList.toggle("active", x===b));
        render();
      }));
      render();
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flower Merge — Gabi's Games</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <a class="back" href="../../games.html">← Back to Games</a>

    <h1>🌸 Flower Merge 🌸</h1>
    <p class="subtitle">Launch flowers, merge matching blooms, and grow the cutest pastel garden.</p>

    <section class="game-card">
      <div class="hud">
        <div>Score: <span id="score">0</span></div>
        <div>Next: <span id="next">🌼</span></div>
        <div>Best: <span id="best">0</span></div>
      </div>

      <label class="name-label">
        Name for leaderboard
        <input id="player-name" maxlength="12" placeholder="Cutie" />
      </label>

      <canvas id="game" width="480" height="640"></canvas>

      <p class="instructions">
        Move your mouse or finger to aim. Click or tap the garden to drop.
      </p>

      <button id="restart">Restart Garden</button>
      <div class="mini-board" id="mini-board">
        <h2>Flower Merge Leaders 🏆</h2>
        <ol id="leaderboard-list">
          <li>No scores yet — grow the first cosmic bloom!</li>
        </ol>
      </div>
    </section>
  </main>

  <script src="../../js/config.js"></script>
  <script src="../../js/leaderboard.js"></script>
  <script src="game.js"></script>
</body>
</html>
